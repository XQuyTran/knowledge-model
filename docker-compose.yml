services:
  neo4j:
    image: neo4j:2026.05.0
    container_name: neo4j-diagnostic
    restart: unless-stopped
    environment:
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512M}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512M}
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_conf:/conf
      - ./neo4j-import:/import
    networks: [diagnostic-net]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u \"$$NEO4J_USER\" -p \"$$NEO4J_PASSWORD\" \"RETURN 1;\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    mem_limit: ${NEO4J_MEM_LIMIT:-2g}
    cpus: ${NEO4J_CPU_LIMIT:-2.0}
    pids_limit: ${NEO4J_PIDS_LIMIT:-512}

  neo4j-seed:
    image: neo4j:2026.05.0
    container_name: neo4j-diagnostic-seed
    depends_on:
      neo4j:
        condition: service_healthy
    profiles: ["seed"]
    restart: "no"
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/workspace/load_neo4j_seed.sh"]
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
    volumes:
      - ./:/workspace:ro
    networks: [diagnostic-net]
    mem_limit: ${SEED_MEM_LIMIT:-512m}
    cpus: ${SEED_CPU_LIMIT:-0.5}
    pids_limit: ${SEED_PIDS_LIMIT:-128}

  app:
    build:
      context: .
      dockerfile: ${APP_DOCKERFILE:-Dockerfile}
    image: ${APP_IMAGE:-diagnostic-pipeline-app:local}
    container_name: diagnostic-pipeline-app
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
      - .env.llm
    environment:
      PYTHONUNBUFFERED: "1"
      USE_NEO4J: ${USE_NEO4J:-true}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
    ports:
      - "${APP_PORT:-8000}:8000"
    networks: [diagnostic-net]
    tmpfs:
      - /tmp:size=256m,nosuid,nodev
      - /workspace:size=256m,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    mem_limit: ${APP_MEM_LIMIT:-1g}
    cpus: ${APP_CPU_LIMIT:-1.5}
    pids_limit: ${APP_PIDS_LIMIT:-256}

networks:
  diagnostic-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_conf:
