<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Code Diagnostic Assistant</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Code Diagnostic Assistant</h1>
      <p>Paste a problem statement and C/C++ solution to receive a diagnosis and step-by-step repair guidance.</p>
    </section>
    <section class="grid">
      <form id="diagnose-form" class="card form-card">
        <label for="problem_statement">Problem statement</label>
        <textarea id="problem_statement" rows="7" required>Compute the sum of n array elements.</textarea>
        <label for="source_code">Source code</label>
        <textarea id="source_code" rows="18" required>#include &lt;iostream&gt;
int main() {
    int n = 5;
    int a[5] = {1, 2, 3, 4, 5};
    int sum = 0;
    for (int i = 0; i &lt;= n; ++i) {
        sum += a[i];
    }
    std::cout &lt;&lt; sum;
}</textarea>
        <details>
          <summary>Optional test case</summary>
          <label for="test_input">Input</label>
          <textarea id="test_input" rows="3"></textarea>
          <label for="expected_output">Expected output</label>
          <textarea id="expected_output" rows="3">15</textarea>
        </details>
        <div class="actions">
          <button type="submit">Diagnose</button>
          <button type="button" id="clear-output">Clear result</button>
        </div>
      </form>
      <section class="card result-card">
        <div class="result-header"><h2>Diagnosis result</h2><span id="status" class="status">Idle</span></div>
        <div id="summary" class="summary"></div>
        <h3>Feedback</h3><pre id="feedback" class="feedback"></pre>
        <h3>Evidence</h3><div id="evidence" class="evidence"></div>
        <h3>Repair plan</h3><ol id="repair-steps" class="repair-steps"></ol>
      </section>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
